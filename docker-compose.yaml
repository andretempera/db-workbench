services:
  # -------------------------
  # SQL Databases
  # -------------------------
  postgres:
    image: postgres:18
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./data/postgres/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
    - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data/mysql/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql

  mariadb:
    image: mariadb:11
    container_name: mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    ports:
      - "${MARIADB_PORT}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./data/mariadb/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql

  # -------------------------
  # NoSQL Databases
  # -------------------------
  mongo:
    image: mongo:7
    container_name: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:8
    container_name: redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data

  cassandra:
    image: cassandra:4
    container_name: cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: ${CASSANDRA_CLUSTER_NAME}
    ports:
      - "${CASSANDRA_PORT}:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8
    container_name: elasticsearch
    environment:
      - "ELASTIC_PASSWORD=${ELASTIC_PASSWORD}"
      - "discovery.type=single-node"
    ports:
      - "${ELASTIC_PORT}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  clickhouse:
    image: clickhouse/clickhouse-server:23
    container_name: clickhouse
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ports:
      - "${CLICKHOUSE_PORT}:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  couchbase:
    image: couchbase:7
    container_name: couchbase
    environment:
      COUCHBASE_ADMIN_USERNAME: ${COUCHBASE_ADMIN_USERNAME}
      COUCHBASE_ADMIN_PASSWORD: ${COUCHBASE_ADMIN_PASSWORD}
    ports:
      - "${COUCHBASE_PORT}:8091"
    volumes:
      - couchbase_data:/opt/couchbase/var

  # -------------------------
  # Web GUIs
  # -------------------------
  pgadmin:
    image: dpage/pgadmin4:9
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5
    container_name: phpmyadmin
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${PHPMYADMIN_PORT}:80"

  mongo-express:
    image: mongo-express:1
    container_name: mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongo
    ports:
      - "${MONGOEXPRESS_PORT}:8081"

  redis-insight:
    image: redislabs/redisinsight:2
    container_name: redis-insight
    ports:
      - "${REDISINSIGHT_PORT}:8001"

  # -------------------------
  # File-based
  # -------------------------
  duckdb:
    image: duckdb/duckdb:latest
    container_name: duckdb
    volumes:
      - ./data/duckdb/db:/workspace
    working_dir: /workspace
    tty: true
    stdin_open: true
    command: ["database.duckdb"]


volumes:
  postgres_data:
  mysql_data:
  mariadb_data:
  mongo_data:
  redis_data:
  cassandra_data:
  elasticsearch_data:
  clickhouse_data:
  couchbase_data: