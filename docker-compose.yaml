services:
  # -------------------------
  # File-based Databases
  # -------------------------

  # --- DuckDB ---
  duckdb-cli:
    image: duckdb/duckdb:latest
    container_name: duckdb-cli
    volumes:
      - ./data/duckdb/db:/workspace
    working_dir: /workspace
    tty: true
    stdin_open: true
    command: ["db_workbench.duckdb"]


  # -------------------------
  # SQL Databases
  # -------------------------

  # --- MariaDB ---
  mariadb:
    image: mariadb:12.3.2
    container_name: mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DB}
    ports:
      - "${MARIADB_PORT}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./data/mariadb/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  # --- phpMyAdmin ---
  phpmyadmin-mariadb:
    image: phpmyadmin/phpmyadmin:5.2.3
    container_name: phpmyadmin-mariadb
    environment:
      PMA_HOST: mariadb
      PMA_DEFAULT_DB: ${MARIADB_DB}
    ports:
      - "${PHPMYADMIN_MARIADB_PORT}:80"
    depends_on:
      mariadb:
        condition: service_healthy

  # --- MariaDB SDK ---
  mariadb-sdk:
    build:
      context: .
      dockerfile: SDK/Dockerfile.MariaDB
    container_name: mariadb-sdk
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      MARIADB_HOST: ${MARIADB_HOST}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DB}
    volumes:
      - ./data/mariadb/scripts:/scripts:ro
      - mariadb_data:/var/lib/mysql
    working_dir: /scripts
    command: tail -f /dev/null


  # --- MySQL ---
  mysql:
    image: mysql:9.6.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data/mysql/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- phpMyAdmin ---
  phpmyadmin-mysql:
    image: phpmyadmin/phpmyadmin:5.2.3
    container_name: phpmyadmin-mysql
    environment:
      PMA_HOST: mysql
      PMA_DEFAULT_DB: ${MYSQL_DB}
    ports:
      - "${PHPMYADMIN_MYSQL_PORT}:80"
    depends_on:
      mysql:
        condition: service_healthy

  # --- MySQL SDK ---
  mysql-sdk:
    build:
      context: .
      dockerfile: SDK/Dockerfile.MySQL
    container_name: mysql-sdk
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
    volumes:
      - ./data/mysql/scripts:/scripts:ro
      - mysql_data:/var/lib/mysql
    working_dir: /scripts
    command: tail -f /dev/null


  # --- PostgreSQL ---
  postgres:
    image: postgres:18.3
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./data/postgres/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- pgAdmin ---
  pgadmin:
    image: dpage/pgadmin4:9.12.0
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy

  # --- PostgreSQL SDK ---
  postgres-sdk:
    build:
      context: .
      dockerfile: SDK/Dockerfile.PostgreSQL
    container_name: postgres-sdk
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: db_workbench
    volumes:
      - ./data/postgres/scripts:/scripts:ro
      - postgres_data:/var/lib/postgresql
    working_dir: /scripts
    command: tail -f /dev/null


  # -------------------------
  # NoSQL Databases
  # -------------------------

  # --- Cassandra ---
  cassandra:
    image: cassandra:5.0.6
    container_name: cassandra
    ports:
      - "${CASSANDRA_PORT}:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./data/cassandra/scripts/init.cql:/docker-entrypoint-initdb.d/init.cql:ro
    environment:
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    mem_limit: 2g
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  # --- Cassandra SDK ---
  cassandra-sdk:
    build:
      context: .
      dockerfile: ./SDK/Dockerfile.Cassandra
    container_name: cassandra-sdk
    depends_on:
      cassandra:
        condition: service_healthy
    environment:
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: 9042
      CASSANDRA_USER: ${CASSANDRA_USER}
      CASSANDRA_PASSWORD: ${CASSANDRA_PASSWORD}
      CASSANDRA_CLUSTER: ${CASSANDRA_CLUSTER}
    volumes:
      - ./data/cassandra/scripts:/scripts:ro
      - cassandra_data:/var/lib/cassandra
    tty: true


  # --- ClickHouse ---
  clickhouse:
    image: clickhouse/clickhouse-server:26.1.3
    container_name: clickhouse
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ports:
      - "${CLICKHOUSE_PORT}:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./data/clickhouse/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user=${CLICKHOUSE_USER} --password=${CLICKHOUSE_PASSWORD} --query='SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # --- ClickHouse SDK ---
  clickhouse-sdk:
    build:
      context: .
      dockerfile: ./SDK/Dockerfile.ClickHouse
    container_name: clickhouse-sdk
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DATABASE: db_workbench
    volumes:
      - ./data/clickhouse/scripts:/scripts:ro
      - clickhouse_data:/var/lib/clickhouse
    tty: true


  # --- Couchbase ---
  couchbase:
    image: couchbase:community-8.0.0
    container_name: couchbase
    environment:
      COUCHBASE_ADMIN_USERNAME: ${COUCHBASE_USER}
      COUCHBASE_ADMIN_PASSWORD: ${COUCHBASE_PASSWORD}
    ports:
      - "${COUCHBASE_PORT}:8091"
    volumes:
      - couchbase_data:/opt/couchbase/var
      - ./data/couchbase/scripts/init.sh:/data/couchbase/scripts/init.sh:ro
      - ./data/couchbase/scripts/init_sdk.py:/data/couchbase/scripts/init_sdk.py:ro
    command: ["couchbase-server", "-d", "trace"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://127.0.0.1:8091/pools/default"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --- Couchbase SDK ---
  couchbase-sdk:
    build:
      context: .
      dockerfile: SDK/Dockerfile.Couchbase
    container_name: couchbase-sdk
    depends_on:
      couchbase:
        condition: service_healthy
    environment:
      COUCHBASE_HOST: couchbase
      COUCHBASE_USER: ${COUCHBASE_USER}
      COUCHBASE_PASSWORD: ${COUCHBASE_PASSWORD}
      COUCHBASE_BUCKET: db_workbench
    volumes:
      - ./data/couchbase/scripts:/scripts:ro
      - couchbase_data:/opt/couchbase/var
    working_dir: /scripts
    command: tail -f /dev/null


  # --- Elasticsearch ---
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    container_name: elasticsearch
    environment:
      - "ELASTIC_PASSWORD=${ELASTIC_PASSWORD}"
      - "discovery.type=single-node"
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g" 
    mem_limit: 2g                        
    ports:
      - "${ELASTIC_PORT}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./data/elasticsearch/scripts/init.py:/scripts/init.py:ro
      - ./data/elasticsearch/scripts/init_kibana.sh:/scripts/init_kibana.sh:ro
      - ./data/elasticsearch/scripts/init_sdk.py:/scripts/init_sdk.py:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fs -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=10s || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 30s

  # --- Kibana ---
  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.1
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=https://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=${KIBANA_SYSTEM_USER}
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
      - ELASTICSEARCH_SSL_VERIFICATIONMODE=none
      - xpack.fleet.enabled=false
      - xpack.fleet.agents.enabled=false
      - xpack.fleet.plugins.fleet.enabled=false
    ports:
      - "${KIBANA_PORT}:5601"
    depends_on:
      - elasticsearch
    restart: unless-stopped

  # --- Elasticsearch SDK ---
  elasticsearch-sdk:
    build:
      context: .
      dockerfile: ./SDK/Dockerfile.Elasticsearch
    container_name: elasticsearch-sdk
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOST: ${ELASTIC_HOST}
      ELASTICSEARCH_PORT: ${ELASTIC_PORT}
      ELASTICSEARCH_USER: ${ELASTIC_USER}
      ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD}
    volumes:
      - ./data/elasticsearch/scripts:/scripts:ro
      - elasticsearch_data:/usr/share/elasticsearch/data
    working_dir: /scripts
    command: tail -f /dev/null
    tty: true


  # --- MongoDB ---
  mongo:
    image: mongo:8.2.5
    container_name: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
      - ./data/mongo/scripts/init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --username ${MONGO_USER} --password ${MONGO_PASSWORD} --eval 'db.adminCommand(\"ping\")' --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Mongo Express---
  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    container_name: mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: ${MONGO_HOST}
      ME_CONFIG_MONGODB_PORT: ${MONGO_PORT}
      ME_CONFIG_MONGODB_AUTH_DATABASE: ${MONGO_AUTH_DB}
      ME_CONFIG_SITE_BASEURL: "/"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "${MONGOEXPRESS_PORT}:8081"
    depends_on:
      mongo:
        condition: service_healthy

  # --- MongoDB SDK ---
  mongo-sdk:
    build:
      context: .
      dockerfile: ./SDK/Dockerfile.MongoDB
    container_name: mongo-sdk
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_HOST: ${MONGO_HOST}
      MONGO_PORT: ${MONGO_PORT}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_AUTH_DB: ${MONGO_AUTH_DB}
      MONGO_DB: ${MONGO_DB}
    volumes:
      - ./data/mongo/scripts:/scripts:ro
      - mongo_data:/data/db
    working_dir: /scripts
    tty: true
    command: tail -f /dev/null


  # --- Redis ---
  redis:
    image: redis:8.6.1
    container_name: redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
      - ./data/redis/scripts/init.redis:/scripts/init.redis:ro
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- RedisInsight ---
  redis-insight:
    image: redislabs/redisinsight:3.2.0
    container_name: redis-insight
    ports:
      - "${REDISINSIGHT_PORT}:5540"
    environment:
      RI_HOST: 0.0.0.0
      RI_NO_ANALYTICS: "true"
    depends_on:
      redis:
        condition: service_healthy

  # --- Redis SDK ---
  redis-sdk:
    build:
      context: .
      dockerfile: ./SDK/Dockerfile.Redis
    container_name: redis-sdk
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./data/redis/scripts:/scripts:ro
      - redis_data:/data
    working_dir: /scripts
    command: tail -f /dev/null
    tty: true


  # -------------------------
  # Volumes
  # -------------------------

volumes:
  mariadb_data:
  mysql_data:
  postgres_data:
  cassandra_data:
  clickhouse_data:
  couchbase_data:
  elasticsearch_data:
  mongo_data:
  redis_data: