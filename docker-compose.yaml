services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./local-databases/data/postgres/db:/var/lib/postgresql/data

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - ./local-databases/data/mysql/db:/var/lib/mysql

  mariadb:
    image: mariadb:11
    container_name: mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    ports:
      - "${MARIADB_PORT}:3306"
    volumes:
      - ./local-databases/data/mariadb/db:/var/lib/mysql

  mongo:
    image: mongo:7
    container_name: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - ./local-databases/data/mongo/db:/data/db

  redis:
    image: redis:8
    container_name: redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./local-databases/data/redis/db:/data

  cassandra:
    image: cassandra:4
    container_name: cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: ${CASSANDRA_CLUSTER_NAME}
    ports:
      - "${CASSANDRA_PORT}:9042"
    volumes:
      - ./local-databases/data/cassandra/db:/var/lib/cassandra

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: elasticsearch
    environment:
      - "ELASTIC_PASSWORD=${ELASTIC_PASSWORD}"
      - "discovery.type=single-node"
    ports:
      - "${ELASTIC_PORT}:9200"
    volumes:
      - ./local-databases/data/elasticsearch/db:/usr/share/elasticsearch/data

  clickhouse:
    image: yandex/clickhouse-server:23.8
    container_name: clickhouse
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ports:
      - "${CLICKHOUSE_PORT}:8123"
    volumes:
      - ./local-databases/data/clickhouse/db:/var/lib/clickhouse

  couchbase:
    image: couchbase:7.2
    container_name: couchbase
    environment:
      COUCHBASE_ADMIN_USERNAME: ${COUCHBASE_ADMIN_USERNAME}
      COUCHBASE_ADMIN_PASSWORD: ${COUCHBASE_ADMIN_PASSWORD}
    ports:
      - "${COUCHBASE_PORT}:8091"
    volumes:
      - ./local-databases/data/couchbase/db:/opt/couchbase/var

  duckdb:
    image: duckdb/duckdb:latest
    container_name: duckdb
    volumes:
      - ./data/duckdb/db:/workspace
    working_dir: /workspace
    tty: true
    stdin_open: true
    command: ["database.duckdb"]